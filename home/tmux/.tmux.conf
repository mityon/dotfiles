# macOS標準のzshをtmux内でも明示的に使う
set-option -g default-shell /bin/zsh

# prefixキーをC-tに変更する
set -g prefix C-t

# C-bのキーバインドを解除する
unbind C-b

# ウィンドウ履歴の最大行数
set-option -g history-limit 5000

# キーストロークのディレイを減らす
set -sg escape-time 1

# ウィンドウのインデックスを1から始める
set -g base-index 1

# ペインのインデックスを1から始める
setw -g pane-base-index 1

# 設定ファイルをリロードする
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# 新しいウィンドウは現在のペインのディレクトリで開く
bind c new-window -c "#{pane_current_path}"

# C-a*2でtmux内のプログラムにC-aを送る
#bind C-a send-prefix

# | でペインを縦に分割する
bind | split-window -h -c "#{pane_current_path}"

# - でペインを横に分割する
bind - split-window -v -c "#{pane_current_path}"

# Vimのキーバインドでペインを移動する
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Vimのキーバインドでペインをリサイズする
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ペイン間同時入力
bind e setw synchronize-panes on
bind E setw synchronize-panes off

# マウス操作を有効にする
#setw -g mouse on

# モダンなmacOS向け端末でtruecolorを使う
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"
set -as terminal-features ",xterm-ghostty:RGB"

set -ag terminal-features "*:extkeys"
# =========================================================
# Theme variables
# Pattern: @<target>_<part>_<property>
# =========================================================

# Base
set -g @theme_bg "#2f2f33"
set -g @theme_fg "#D8DEE9"
set -g @theme_muted_fg "colour244"
set -g @theme_accent "#88C0D0"
set -g @theme_alert "#BF616A"

# Status line
set -g @status_bg "#414146"
set -g @status_fg "#D8DEE9"

set -g @status_left_bg "#2E2E32"
set -g @status_left_fg "#D2D6DC"
set -g @status_left_separator_fg "#{@status_left_bg}"
set -g @status_left_separator_bg "#{@status_left_bg}"

set -g @status_right_bg "#2E2E32"
set -g @status_right_fg "#D2D6DC"
set -g @status_right_separator_fg "#{@status_right_bg}"
set -g @status_right_separator_bg "#{@status_right_bg}"

# Window list
set -g @window_status_bg "#2E2E32"
set -g @window_status_fg "#D2D6DC"
set -g @window_status_separator_fg "colour237"
set -g @window_status_name_fg "colour255"
set -g @window_status_flag_fg "colour244"

set -g @window_status_current_bg "#E6E6E1"
set -g @window_status_current_fg "#3c3f43"
set -g @window_status_current_separator_fg "#{@window_status_current_bg}"
set -g @window_status_current_separator_bg "#{@status_bg}"

set -g @window_status_activity_fg "#EBCB8B"
set -g @window_status_bell_fg "#BF616A"


# Pane borders
set -g @pane_border_fg "#3B4252"
set -g @pane_border_bg "colour0"
set -g @pane_active_border_fg "#ABB2BF"
set -g @pane_active_border_bg "colour0"

# Pane border status
set -g @pane_status_bg "colour236"
set -g @pane_status_fg "colour245"
set -g @pane_status_current_bg "#88C0D0"
set -g @pane_status_current_fg "black"

# Messages / command prompt
set -g @message_bg "black"
set -g @message_fg "white"
set -g @message_command_bg "#EBCB8B"
set -g @message_command_fg "black"

# Modes / copy mode
set -g @mode_bg "#414146"
set -g @mode_fg "#D8DEE9"
set -g @copy_selection_bg "#5E81AC"
set -g @copy_selection_fg "white"
set -g @copy_match_bg "#EBCB8B"
set -g @copy_match_fg "black"
set -g @copy_current_match_bg "#BF616A"
set -g @copy_current_match_fg "white"

# Popups / menus
set -g @popup_bg "colour235"
set -g @popup_fg "#D8DEE9"
set -g @popup_border_fg "#88C0D0"

set -g @menu_bg "colour235"
set -g @menu_fg "#D8DEE9"
set -g @menu_selected_bg "#88C0D0"
set -g @menu_selected_fg "black"
set -g @menu_border_fg "#88C0D0"
set -g @cyan_soft "#88C0D0"

# ステータスバーの色を設定する
set -Fg status-style "fg=#{@status_fg},bg=#{@status_bg}"
# ウィンドウリストの色を設定する
set -Fg window-status-style "fg=#{@window_status_fg},bg=#{@window_status_bg}"
setw -g window-status-format ' #I#[fg=#{@window_status_separator_fg}]:#[fg=#{@window_status_name_fg}]#W#[fg=#{@window_status_flag_fg}]#F '
# アクティブなウィンドウを目立たせる
set -Fg window-status-current-style "fg=#{@window_status_current_fg},bg=#{@window_status_current_bg},bright"
setw -g window-status-current-format ' #[bold]#I #W #F '
set -g window-status-separator ""

# ペインボーダーの色を設定する
set -Fg pane-border-style "fg=#{@pane_border_fg},bg=#{@pane_border_bg}"
# アクティブなペインを目立たせる
#set -g pane-active-border-fg white
set -Fg pane-active-border-style "fg=#{@pane_active_border_fg},bg=#{@pane_active_border_bg}"

# コマンドラインの色を設定する
set -Fg message-style "fg=#{@message_fg},bg=#{@message_bg},bright"

# ステータスバーを設定する
## 左パネルを設定する
set -g status-left-length 40
#set -g status-left "#[fg=green]Session: #S #[fg=yellow]#I #[fg=cyan]#P"
set -g status-left '#[fg=#{@status_left_fg},bg=#{@status_left_bg}]   #S : #P #[fg=#{@status_left_bg},bg=#{@status_bg}]'
## 右パネルを設定する
# set -g status-right "#[fg=cyan][%Y-%m-%d(%a) %H:%M]"
set -g status-right "#[fg=#{@status_right_bg},bg=#{@status_bg}]#[fg=#{@status_right_fg},bg=#{@status_right_bg}]  %H:%M  "
## リフレッシュの間隔を設定する(デフォルト 15秒)
set -g status-interval 60
## ウィンドウリストの位置を中心寄せにする
set -g status-justify centre
## ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on
## ステータスバーを上部に表示する
set -g status-position top
## mode-style
set -g  mode-style "fg=#{@mode_fg},bg=#{@mode_bg}"

# コピーモードを設定する
## viのキーバインドを使用する
setw -g mode-keys vi
## コピーモードの操作をvi風に設定し、macOSのクリップボードへコピーする
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

#
# マウス設定
#

# 画面ドラッグ時にコピーモードにする
set-option -g mouse on
