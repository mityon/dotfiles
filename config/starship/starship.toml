"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
command_timeout = 1000
scan_timeout = 30

format = """
[ ÓúĎ ](bg:#9ec7be fg:#111d1a)\
[Óāī](bg:#43766a fg:#9ec7be)\
$directory\
[Óāī](fg:#43766a bg:#2b4841)\
$git_branch\
[Óāī](fg:#2b4841 bg:#1d302c)\
$nodejs\
$bun\
$rust\
$golang\
$php\
[Óāī](fg:#1d302c bg:#152421)\
$time\
[Óāī ](fg:#152421)\
\n$character"""

[directory]
style = "fg:#ffffff bg:#43766a"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[git_branch]
symbol = "Ôźė"
style = "bg:#2b4841"
format = '[[ $symbol $branch ](fg:#8ac6b8 bg:#2b4841)]($style)'

[git_status]
style = "bg:#2b4841"
format = '[[($all_status$ahead_behind )](fg:#8ac6b8 bg:#2b4841)]($style)'

# [git_branch]
# format = " [$symbol$branch]($style)"
# symbol = "git:"
# style = "bold purple"

# [git_status]
# disabled = true
# format = " [$all_status$ahead_behind]($style)"
# style = "bold yellow"

[cmd_duration]
disabled = true
min_time = 1000
format = " took [$duration]($style)"
style = "bold yellow"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[package]
disabled = true
